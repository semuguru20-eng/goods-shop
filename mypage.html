<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>내 결제내역 - 굿즈샵</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4d7fd9">
<link rel="icon" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TuringShop">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<header>
  <div class="brand">굿즈샵</div>
  <nav id="nav"></nav>
</header>
<main>
  <h1>내 결제내역</h1>
  <div class="card">
    <div class="table-scroll">
    <table id="orders-table">
      <thead>
        <tr><th>주문명</th><th>금액</th><th>상태</th><th>주문일시</th></tr>
      </thead>
      <tbody id="orders-body"></tbody>
    </table>
    </div>
    <p class="message" id="empty-msg" style="display:none">아직 결제 내역이 없습니다.</p>
  </div>
  <div class="card" id="push-card" style="display:none">
    <h2>알림 설정</h2>
    <p class="message" id="push-status-msg"></p>
    <button class="primary" id="push-enable-btn" style="display:none">알림 받기</button>
    <button class="primary" id="push-test-btn" style="display:none">테스트 알림 보내기</button>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script src="js/config.js"></script>
<script src="js/mypage.js"></script>
<script src="js/pwa.js"></script>
<script src="js/install-banner.js"></script>
</body>
</html>
