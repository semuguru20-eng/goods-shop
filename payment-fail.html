<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패 - 굿즈샵</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="brand">굿즈샵</div>
  <nav id="nav"></nav>
</header>
<main>
  <h1>결제에 실패했습니다</h1>
  <div class="card">
    <p class="error" id="fail-detail"></p>
    <p><a href="products.html">상품 목록으로 돌아가기</a></p>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById("fail-detail").textContent =
    (params.get("message") || "알 수 없는 오류") + " (code: " + (params.get("code") || "-") + ")";
</script>
</body>
</html>
